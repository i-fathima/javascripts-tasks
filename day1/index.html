<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JavaScript Task Buttons</title>
        <style>
    body { font-family: Arial, sans-serif; margin: 0; min-height: 100vh; background: #f8f9fb; color: #222; }
    header { padding: 24px; background: #2c3e50; color: white; text-align: center; }
    main { padding: 18px; max-width: 1200px; margin: 0 auto; }
    .button-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    button { padding: 14px 12px; border: 1px solid #3b4c63; border-radius: 8px; background: white; color: #2c3e50; font-weight: 600; cursor: pointer; text-align: left; }
    button:hover { background: #ecf2f8; }
    button:focus { outline: 2px solid #2980b9; }
    .description { display: block; font-size: 0.85rem; color: #555; margin-top: 6px; }
  </style>
    </head>
    <body>
        <header>
            <h1>JavaScript Tasks</h1>
            <p>Click a button to run the task and see the result in an alert
                dialog.</p>
        </header>
        <main>
            <div class="button-grid">
                <button id="task01" type="button"><strong>Task 1</strong><span
                        class="description">Declare three variables in one
                        line.</span></button>
                <button id="task02" type="button"><strong>Task 2</strong><span
                        class="description">Store your age in a variable and
                        print it.</span></button>
                <button id="task03" type="button"><strong>Task 3</strong><span
                        class="description">Store your city in a variable and
                        print it.</span></button>
                <button id="task04" type="button"><strong>Task 4</strong><span
                        class="description">Swap two variable
                        values.</span></button>
                <button id="task05" type="button"><strong>Task 5</strong><span
                        class="description">Create variables for firstName and
                        lastName, then combine them.</span></button>
                <button id="task06" type="button"><strong>Task 6</strong><span
                        class="description">Create a variable without value and
                        print it.</span></button>
                <button id="task07" type="button"><strong>Task 7</strong><span
                        class="description">Assign value later to an empty
                        variable.</span></button>
                <button id="task08" type="button"><strong>Task 8</strong><span
                        class="description">Check the type of a let
                        variable.</span></button>
                <button id="task09" type="button"><strong>Task 9</strong><span
                        class="description">Create a variable for product stock
                        count.</span></button>
                <button id="task10" type="button"><strong>Task 10</strong><span
                        class="description">Update stock count after selling one
                        item.</span></button>
                <button id="task11" type="button"><strong>Task 11</strong><span
                        class="description">Create a constant tax
                        rate.</span></button>
                <button id="task12" type="button"><strong>Task 12</strong><span
                        class="description">Create variables for width and
                        height.</span></button>
                <button id="task13" type="button"><strong>Task 13</strong><span
                        class="description">Store multiple student names in
                        separate variables.</span></button>
                <button id="task14" type="button"><strong>Task 14</strong><span
                        class="description">Create a variable with camelCase
                        naming style.</span></button>
                <button id="task15" type="button"><strong>Task 15</strong><span
                        class="description">Create a variable with meaningful
                        naming.</span></button>
                <button id="task16" type="button"><strong>Task 16</strong><span
                        class="description">Compare let and var using same
                        variable name.</span></button>
                <button id="task17" type="button"><strong>Task 17</strong><span
                        class="description">Create a variable for login
                        status.</span></button>
                <button id="task18" type="button"><strong>Task 18</strong><span
                        class="description">Update login status from false to
                        true.</span></button>
                <button id="task19" type="button"><strong>Task 19</strong><span
                        class="description">Create variables for day, month,
                        year.</span></button>
                <button id="task20" type="button"><strong>Task 20</strong><span
                        class="description">Print all created variables
                        together.</span></button>
                <button id="task21" type="button"><strong>Task 21</strong><span
                        class="description">Create a string variable for your
                        name.</span></button>
                <button id="task22" type="button"><strong>Task 22</strong><span
                        class="description">Create a string for email
                        address.</span></button>
                <button id="task23" type="button"><strong>Task 23</strong><span
                        class="description">Combine two strings using
                        +.</span></button>
                <button id="task24" type="button"><strong>Task 24</strong><span

                <button id="task25" type="button"><strong>Task 25</strong><span

                <button id="task30" type="button"><strong>Task 30</strong><span

                <button id="task31" type="button"><strong>Task 31</strong><span

                <button id="task32" type="button"><strong>Task 32</strong><span

                <button id="task62" type="button"><strong>Task 62</strong><span

                <button id="task63" type="button"><strong>Task 63</strong><span

                <button id="task64" type="button"><strong>Task 64</strong><span

                <button id="task65" type="button"><strong>Task 65</strong><span

                <button id="task66" type="button"><strong>Task 66</strong><span

                <button id="task67" type="button"><strong>Task 67</strong><span

        <script type="module" src="main.js"></script>

</html>
